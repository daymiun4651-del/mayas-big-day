// ============ GAME ENGINE ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 960;
canvas.height = 540;

// Scale canvas to fit window
function resizeCanvas() {
  const ratio = Math.min(window.innerWidth / 960, window.innerHeight / 540);
  canvas.style.width = (960 * ratio) + 'px';
  canvas.style.height = (540 * ratio) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Load images
function loadImg(src) {
  const img = new Image();
  img.src = src;
  return img;
}
const imgBrad = loadImg(IMG_BRAD);
const imgKs = loadImg(IMG_KS);
const imgMarcolii = loadImg(IMG_MARCOLII);
const imgMaya = loadImg(IMG_MAYA);
const imgMo = loadImg(IMG_MO);

// Input
const keys = {};
const gameKeys = new Set(['a','A','d','D','w','W','s','S','ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Shift','Enter']);
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (gameKeys.has(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (gameKeys.has(e.key)) e.preventDefault();
});
window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; });
document.addEventListener('visibilitychange', () => { if (document.hidden) for (const k in keys) keys[k] = false; });

// Mobile detection & touch state
const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 1024);
const touch = { left: false, right: false, up: false, shootL: false, shootR: false, shootU: false, shootD: false, space: false, shift: false };

// Game state
let gameState = 'menu'; // menu, intro, levelSelect, playing, dialogue, victory
let currentLevel = null;
let levelsCompleted = { marcolii: false, ks: false, brad: false, mo: false };
let unlockedAbilities = { babyBomb: false, humpShield: false, braderall: false };
let dialogueText = '';
let dialogueCallback = null;
let dialogueCharIndex = 0;
let dialogueTimer = 0;
let menuBlink = 0;
let introShown = false;
let lives = 3;
let deathHandled = false;

// ============ PLAYER ============
const player = {
  x: 100, y: 400, w: 40, h: 50, vx: 0, vy: 0,
  speed: 2.8, hp: 100, maxHp: 100, grounded: false,
  facing: 1, shootCooldown: 0, weapon: 'normal',
  shieldActive: false, shieldTimer: 0,
  invincible: 0
};

// ============ LEVEL DATA ============
let enemies = [];
let projectiles = [];
let enemyProjectiles = [];
let platforms = [];
let particles = [];
let effects = [];
let bossDefeated = false;
let spawnTimer = 0;
let levelTime = 0;

function generatePlatforms() {
  platforms = [
    // Ground
    { x: 0, y: 480, w: 960, h: 60 },
    // Platforms
    { x: 100, y: 380, w: 150, h: 20 },
    { x: 350, y: 320, w: 150, h: 20 },
    { x: 550, y: 260, w: 150, h: 20 },
    { x: 750, y: 340, w: 150, h: 20 },
    { x: 200, y: 200, w: 120, h: 20 },
    { x: 500, y: 160, w: 120, h: 20 },
    { x: 50, y: 280, w: 100, h: 20 },
    { x: 700, y: 200, w: 130, h: 20 },
    { x: 400, y: 420, w: 120, h: 20 },
  ];
}

function resetPlayer() {
  player.x = 100; player.y = 400;
  player.vx = 0; player.vy = 0;
  player.hp = 100; player.grounded = false;
  player.weapon = 'normal';
  player.shieldActive = false; player.shieldTimer = 0;
  player.invincible = 0;
  player.shootCooldown = 0;
}

// Enemy class
class Enemy {
  constructor(x, y, type, isBoss = false) {
    this.x = x; this.y = y; this.w = 45; this.h = 55;
    this.vx = 0; this.vy = 0;
    this.type = type;
    this.isBoss = isBoss;
    this.hp = isBoss ? 80 : 15;
    this.maxHp = this.hp;
    this.shootTimer = Math.random() * 60;
    this.moveTimer = 0;
    this.distracted = false;
    this.distractTimer = 0;
    this.latched = false;
    this.latchTimer = 0;
    this.grounded = false;
    this.alive = true;
    this.flash = 0;
    this.dir = Math.random() > 0.5 ? 1 : -1;
    if (isBoss) { this.w = 75; this.h = 85; }
  }

  getImg() {
    switch(this.type) {
      case 'marcolii': return imgMarcolii;
      case 'ks': return imgKs;
      case 'brad': return imgBrad;
      case 'mo': return imgMo;
    }
  }

  getProjectileEmoji() {
    switch(this.type) {
      case 'marcolii': return '👶';
      case 'ks': return 'NGL';
      case 'brad': return '💊';
      case 'mo': return '🎹';
    }
  }

  update() {
    if (!this.alive) return;

    if (this.distracted) {
      this.distractTimer--;
      if (this.distractTimer <= 0) this.distracted = false;
      // Float hearts
      if (Math.random() < 0.1) {
        particles.push({ x: this.x + this.w/2, y: this.y, vx: (Math.random()-0.5)*2, vy: -2, life: 40, text: '❤️', size: 16 });
      }
      return;
    }

    if (this.latched) {
      this.x = player.x + (Math.random()-0.5)*4;
      this.y = player.y - 40;
      this.latchTimer--;
      if (player.hp > 0) player.hp -= 0.08;
      if (this.latchTimer <= 0) this.latched = false;
      return;
    }

    this.moveTimer++;

    // Type-specific AI
    switch(this.type) {
      case 'marcolii':
        // Simple patrol
        if (this.moveTimer % 160 < 80) this.vx = this.dir * 0.7;
        else this.vx = -this.dir * 0.7;
        this.shootTimer--;
        if (this.shootTimer <= 0) {
          this.shoot();
          this.shootTimer = this.isBoss ? 80 : 120;
        }
        break;

      case 'ks':
        // Move toward player, latch if close
        const dxKs = player.x - this.x;
        const dyKs = player.y - this.y;
        const distKs = Math.sqrt(dxKs*dxKs + dyKs*dyKs);
        this.vx = Math.sign(dxKs) * 1;
        if (distKs < 50 && !this.latched && Math.random() < 0.01) {
          this.latched = true;
          this.latchTimer = 120;
        }
        this.shootTimer--;
        if (this.shootTimer <= 0 && !this.latched) {
          this.shoot();
          this.shootTimer = this.isBoss ? 60 : 90;
        }
        break;

      case 'brad':
        // Fast erratic movement (but toned down)
        if (this.moveTimer % 35 === 0) {
          this.vx = (Math.random() - 0.5) * 4;
          if (Math.random() < 0.2 && this.grounded) this.vy = -7;
        }
        this.shootTimer--;
        if (this.shootTimer <= 0) {
          this.shoot();
          this.shootTimer = this.isBoss ? 50 : 80;
        }
        break;

      case 'mo':
        // Steady, shoots pianos
        const dxMo = player.x - this.x;
        this.vx = Math.sign(dxMo) * 0.7;
        if (this.moveTimer % 120 === 0 && this.grounded) this.vy = -6;
        this.shootTimer--;
        if (this.shootTimer <= 0) {
          this.shoot();
          this.shootTimer = this.isBoss ? 65 : 95;
        }
        break;
    }

    // Physics
    this.vy += 0.5;
    this.x += this.vx;
    this.y += this.vy;
    this.grounded = false;

    // Platform collision
    for (const p of platforms) {
      if (this.x + this.w > p.x && this.x < p.x + p.w &&
          this.y + this.h > p.y && this.y + this.h < p.y + p.h + 15 && this.vy > 0) {
        this.y = p.y - this.h;
        this.vy = 0;
        this.grounded = true;
      }
    }

    // Keep in bounds
    if (this.x < 0) { this.x = 0; this.dir *= -1; }
    if (this.x > 960 - this.w) { this.x = 960 - this.w; this.dir *= -1; }

    if (this.flash > 0) this.flash--;
  }

  shoot() {
    const dx = player.x - this.x;
    const dy = player.y - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const speed = this.type === 'brad' ? 3 : 2;
    enemyProjectiles.push({
      x: this.x + this.w/2, y: this.y + this.h/2,
      vx: (dx/dist) * speed, vy: (dy/dist) * speed,
      text: this.getProjectileEmoji(),
      damage: this.type === 'brad' ? 6 : 5,
      life: 180
    });
  }

  draw() {
    if (!this.alive) return;
    ctx.save();
    if (this.flash > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(this.flash * 0.5) * 0.5;
    }
    if (this.distracted) ctx.globalAlpha = 0.6;
    ctx.drawImage(this.getImg(), this.x, this.y, this.w, this.h);

    // HP bar for bosses
    if (this.isBoss) {
      const barW = 400;
      const barH = 18;
      const barX = 280;
      const barY = 510;
      // Background
      ctx.fillStyle = '#111';
      ctx.fillRect(barX - 4, barY - 22, barW + 8, barH + 28);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX - 4, barY - 22, barW + 8, barH + 28);
      // Name
      ctx.fillStyle = '#ff6b35';
      ctx.font = '11px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText(this.type.toUpperCase() === 'MARCOLII' ? 'MARCOLINI' : this.type.toUpperCase(), barX + barW/2, barY - 6);
      ctx.textAlign = 'left';
      // Bar track
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      // Bar fill with gradient
      const hpRatio = this.hp / this.maxHp;
      const barGrad = ctx.createLinearGradient(barX, barY, barX + barW * hpRatio, barY);
      barGrad.addColorStop(0, hpRatio > 0.5 ? '#e22' : hpRatio > 0.25 ? '#f80' : '#f44');
      barGrad.addColorStop(1, hpRatio > 0.5 ? '#f44' : hpRatio > 0.25 ? '#fa0' : '#f66');
      ctx.fillStyle = barGrad;
      ctx.fillRect(barX, barY, barW * hpRatio, barH);
      // Border
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(barX, barY, barW, barH);
      // HP text
      ctx.fillStyle = '#fff';
      ctx.font = '8px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText(Math.ceil(this.hp) + ' / ' + this.maxHp, barX + barW/2, barY + 13);
      ctx.textAlign = 'left';
    }
    ctx.restore();
  }

  takeDamage(dmg) {
    this.hp -= dmg;
    this.flash = 15;
    for (let i = 0; i < 5; i++) {
      particles.push({
        x: this.x + this.w/2, y: this.y + this.h/2,
        vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
        life: 20, text: null, size: 3, color: '#ff0'
      });
    }
    if (this.hp <= 0) {
      this.alive = false;
      for (let i = 0; i < 15; i++) {
        particles.push({
          x: this.x + this.w/2, y: this.y + this.h/2,
          vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
          life: 40, text: null, size: 5, color: this.isBoss ? '#f80' : '#ff0'
        });
      }
    }
  }
}

// ============ LEVEL INIT ============
function startLevel(level) {
  currentLevel = level;
  gameState = 'playing';
  enemies = [];
  projectiles = [];
  enemyProjectiles = [];
  particles = [];
  effects = [];
  bossDefeated = false;
  deathHandled = false;
  spawnTimer = 0;
  levelTime = 0;
  generatePlatforms();
  resetPlayer();

  // Spawn single boss enemy with scaling HP
  const boss = new Enemy(700, 350, level, true);
  switch(level) {
    case 'marcolii': boss.hp = 120; boss.maxHp = 120; break;
    case 'ks': boss.hp = 160; boss.maxHp = 160; break;
    case 'brad': boss.hp = 200; boss.maxHp = 200; break;
    case 'mo': boss.hp = 250; boss.maxHp = 250; break;
  }
  enemies.push(boss);
}

// ============ UPDATE ============
function updateGame() {
  if (gameState !== 'playing') return;

  levelTime++;

  // Player movement (keyboard + touch)
  const spd = player.speed;
  if (keys['a'] || keys['A'] || touch.left) { player.vx = -spd; player.facing = -1; }
  else if (keys['d'] || keys['D'] || touch.right) { player.vx = spd; player.facing = 1; }
  else player.vx *= 0.7;

  if ((keys['w'] || keys['W'] || touch.up) && player.grounded) {
    player.vy = -10;
    player.grounded = false;
  }

  // Gravity
  player.vy += 0.5;
  player.x += player.vx;
  player.y += player.vy;
  player.grounded = false;

  // Platform collision
  for (const p of platforms) {
    if (player.x + player.w > p.x && player.x < p.x + p.w &&
        player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15 && player.vy > 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.grounded = true;
    }
  }

  // Keep player in bounds
  if (player.x < 0) player.x = 0;
  if (player.x > 960 - player.w) player.x = 960 - player.w;
  if (player.y > 500) { player.y = 400; player.vy = 0; player.hp -= 10; }

  // Shooting - arrow keys + touch
  player.shootCooldown--;
  const shootRate = unlockedAbilities.braderall ? 5 : 10;
  if (player.shootCooldown <= 0) {
    let sx = 0, sy = 0;
    if (keys['ArrowRight'] || touch.shootR) sx = 1;
    else if (keys['ArrowLeft'] || touch.shootL) sx = -1;
    if (keys['ArrowUp'] || touch.shootU) sy = -1;
    else if (keys['ArrowDown'] || touch.shootD) sy = 1;
    if (sx !== 0 || sy !== 0) {
      const dist = Math.sqrt(sx*sx + sy*sy) || 1;
      projectiles.push({
        x: player.x + player.w/2, y: player.y + player.h/2,
        vx: (sx/dist) * 6, vy: (sy/dist) * 6,
        damage: 5, life: 60, type: 'normal'
      });
      player.shootCooldown = shootRate;
    }
  }

  // Baby bomb - space / touch
  if ((keys[' '] || touch.space) && unlockedAbilities.babyBomb) {
    if (!player._bombCooldown || player._bombCooldown <= 0) {
      projectiles.push({
        x: player.x + player.w/2, y: player.y + player.h/2,
        vx: player.facing * 5, vy: 0,
        damage: 3, life: 120, type: 'baby', text: '👶'
      });
      player._bombCooldown = 45;
    }
  }
  if (player._bombCooldown > 0) player._bombCooldown--;

  // Shield - shift / touch
  if ((keys['Shift'] || touch.shift) && unlockedAbilities.humpShield && !player.shieldActive) {
    player.shieldActive = true;
    player.shieldTimer = 90;
  }
  if (player.shieldActive) {
    player.shieldTimer--;
    if (player.shieldTimer <= 0) player.shieldActive = false;
  }

  // Update invincibility
  if (player.invincible > 0) player.invincible--;

  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0 || p.x < -20 || p.x > 980 || p.y < -20 || p.y > 560) {
      projectiles.splice(i, 1);
      continue;
    }
    // Hit enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      if (p.x > e.x && p.x < e.x + e.w && p.y > e.y && p.y < e.y + e.h) {
        if (p.type === 'baby' && e.type === 'ks') {
          e.distracted = true;
          e.distractTimer = 300;
          e.latched = false;
        } else {
          e.takeDamage(p.damage);
        }
        projectiles.splice(i, 1);
        break;
      }
    }
  }

  // Update enemy projectiles
  for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
    const p = enemyProjectiles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0 || p.x < -20 || p.x > 980 || p.y < -20 || p.y > 560) {
      enemyProjectiles.splice(i, 1);
      continue;
    }
    // Hit player
    if (!player.shieldActive && player.invincible <= 0 &&
        p.x > player.x && p.x < player.x + player.w &&
        p.y > player.y && p.y < player.y + player.h) {
      player.hp -= p.damage;
      player.invincible = 30;
      enemyProjectiles.splice(i, 1);
    } else if (player.shieldActive &&
        p.x > player.x - 20 && p.x < player.x + player.w + 20 &&
        p.y > player.y - 20 && p.y < player.y + player.h + 20) {
      // Shield blocks it
      enemyProjectiles.splice(i, 1);
      particles.push({ x: p.x, y: p.y, vx: 0, vy: -1, life: 20, text: '🛡️', size: 16 });
    }
  }

  // Update enemies
  for (const e of enemies) e.update();

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Check boss death (only if player is alive)
  const boss = enemies.find(e => e.isBoss);
  if (boss && !boss.alive && !bossDefeated && player.hp > 0) {
    bossDefeated = true;
    setTimeout(() => {
      showLevelCompleteDialogue();
    }, 1000);
  }

  // Player death
  if (player.hp <= 0 && !deathHandled) {
    player.hp = 0;
    deathHandled = true;
    lives--;
    if (lives <= 0) {
      // Game over - reset everything
      setTimeout(() => {
        lives = 3;
        levelsCompleted = { marcolii: false, ks: false, brad: false, mo: false };
        unlockedAbilities = { babyBomb: false, humpShield: false, braderall: false };
        showDialogue("GAME OVER! You ran out of lives. Back to the start...", () => {
          gameState = 'levelSelect';
        });
      }, 1000);
    } else {
      // Go back one level
      const levelOrder = ['marcolii', 'ks', 'brad', 'mo'];
      const currentIdx = levelOrder.indexOf(currentLevel);
      setTimeout(() => {
        // Make sure current level is NOT marked complete
        levelsCompleted[currentLevel] = false;
        if (currentIdx > 0) {
          // Un-complete previous level and send back there
          const prevLevel = levelOrder[currentIdx - 1];
          levelsCompleted[prevLevel] = false;
          // Remove the ability from that level
          switch(prevLevel) {
            case 'marcolii': unlockedAbilities.babyBomb = false; break;
            case 'ks': unlockedAbilities.humpShield = false; break;
            case 'brad': unlockedAbilities.braderall = false; break;
          }
          showDialogue("You lost a life! " + lives + " remaining. You've been sent back to " + prevLevel.toUpperCase() + "!", () => {
            startLevel(prevLevel);
          });
        } else {
          // Already on first level, just restart it
          showDialogue("You lost a life! " + lives + " remaining. Try again!", () => {
            startLevel(currentLevel);
          });
        }
      }, 1000);
    }
  }
}

function showLevelCompleteDialogue() {
  levelsCompleted[currentLevel] = true;
  let text = '';
  switch(currentLevel) {
    case 'marcolii':
      unlockedAbilities.babyBomb = true;
      text = "MARCOLINI defeated! You unlocked the BABY BOMB! Press SPACEBAR to launch a baby emoji that distracts KS enemies. They can't resist!";
      break;
    case 'ks':
      unlockedAbilities.humpShield = true;
      text = "KS defeated! You unlocked the HUMP SHIELD! Press SHIFT to activate a protective shield that blocks enemy projectiles for a short time!";
      break;
    case 'brad':
      unlockedAbilities.braderall = true;
      text = "BRAD defeated! You unlocked BRADERALL! Your shooting speed is now 2x faster. Time to bring the heat!";
      break;
    case 'mo':
      text = "Congrats Maya, your big day went as planned. You shut down the supermarket. Congrats!!!!";
      break;
  }
  showDialogue(text, () => {
    if (currentLevel === 'mo') {
      gameState = 'victory';
    } else {
      gameState = 'levelSelect';
    }
  });
}

function showDialogue(text, callback) {
  gameState = 'dialogue';
  dialogueText = text;
  dialogueCharIndex = 0;
  dialogueTimer = 0;
  dialogueCallback = callback;
}

// ============ DRAW ============
function drawMenu() {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, 540);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0f3460');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 540);

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let y = 0; y < 540; y += 4) {
    ctx.fillRect(0, y, 960, 2);
  }

  // Stars
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137.5 + menuBlink * 0.2) % 960;
    const sy = (i * 97.3) % 540;
    const s = Math.sin(menuBlink * 0.05 + i) * 0.5 + 1.5;
    ctx.fillRect(sx, sy, s, s);
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff6b35';
  ctx.font = '28px "Press Start 2P"';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 20;
  ctx.fillText("MAYA'S BIG DAY", 480, 160);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#e8d44d';
  ctx.font = '14px "Press Start 2P"';
  ctx.fillText("The Supermarket Shoot Out", 480, 200);

  // Maya face
  ctx.drawImage(imgMaya, 420, 230, 120, 140);

  // Blink prompt
  menuBlink++;
  if (Math.floor(menuBlink / 30) % 2 === 0) {
    ctx.fillStyle = '#fff';
    ctx.font = '12px "Press Start 2P"';
    ctx.fillText(isMobile ? "TAP TO START" : "PRESS ENTER TO START", 480, 440);
  }

  ctx.textAlign = 'left';
  ctx.shadowBlur = 0;
}

function drawIntro() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, 960, 540);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#7ec8e3';
  ctx.font = '12px "Press Start 2P"';

  const introText = "Good morning Maya, today is a big day.\nYou've been planning this one for a while.\nTake a look at your list and\ndecide where to start!";
  const lines = introText.split('\n');
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], 480, 200 + i * 35);
  }

  menuBlink++;
  if (Math.floor(menuBlink / 30) % 2 === 0) {
    ctx.fillStyle = '#fff';
    ctx.font = '10px "Press Start 2P"';
    ctx.fillText(isMobile ? "TAP TO CONTINUE" : "PRESS ENTER TO CONTINUE", 480, 420);
  }
  ctx.textAlign = 'left';
}

function drawLevelSelect() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, 960, 540);

  // Grid pattern bg
  ctx.strokeStyle = 'rgba(100,100,255,0.07)';
  for (let x = 0; x < 960; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,540); ctx.stroke(); }
  for (let y = 0; y < 540; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(960,y); ctx.stroke(); }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff6b35';
  ctx.font = '20px "Press Start 2P"';
  ctx.fillText("SHOPPING LIST", 480, 60);

  const levels = [
    { key: 'marcolii', name: 'MARCOLINI', img: imgMarcolii, color: '#4ecdc4' },
    { key: 'ks', name: 'KS', img: imgKs, color: '#ff6b6b' },
    { key: 'brad', name: 'BRAD', img: imgBrad, color: '#ffd93d' },
    { key: 'mo', name: 'MO', img: imgMo, color: '#6c5ce7' },
  ];

  const levelOrder = ['marcolii', 'ks', 'brad', 'mo'];

  for (let i = 0; i < levels.length; i++) {
    const l = levels[i];
    const x = 120 + i * 200;
    const y = 150;
    const completed = levelsCompleted[l.key];
    const prevCompleted = i === 0 || levelsCompleted[levelOrder[i-1]];
    const locked = !prevCompleted;

    // Card bg
    ctx.fillStyle = locked ? '#1a1a2e' : (completed ? '#1a3a1a' : '#1a1a3e');
    ctx.strokeStyle = locked ? '#333' : l.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(x, y, 160, 280, 10);
    ctx.fill();
    ctx.stroke();

    // Face
    ctx.globalAlpha = locked ? 0.3 : 1;
    ctx.drawImage(l.img, x + 30, y + 20, 100, 120);
    ctx.globalAlpha = 1;

    // Name
    ctx.fillStyle = locked ? '#555' : l.color;
    ctx.font = '14px "Press Start 2P"';
    ctx.fillText(l.name, x + 80, y + 170);

    if (completed) {
      ctx.fillStyle = '#4f4';
      ctx.font = '24px "Press Start 2P"';
      ctx.fillText('✓', x + 80, y + 220);
    } else if (!locked) {
      ctx.fillStyle = '#fff';
      ctx.font = '10px "Press Start 2P"';
      ctx.fillText(isMobile ? 'TAP' : 'PRESS ' + (i+1), x + 80, y + 220);
    } else {
      ctx.fillStyle = '#555';
      ctx.font = '10px "Press Start 2P"';
      ctx.fillText('LOCKED', x + 80, y + 220);
    }
  }

  // Controls help
  ctx.fillStyle = '#666';
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText(isMobile ? "Tap a level card to begin!" : "WASD: Move | Arrows: Shoot | Space: Baby Bomb | Shift: Shield", 480, 490);

  // Lives display
  ctx.fillStyle = '#ff6b35';
  ctx.font = '10px "Press Start 2P"';
  ctx.fillText("LIVES: " + '♥'.repeat(lives), 480, 515);

  ctx.textAlign = 'left';
}

function drawGame() {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, 540);
  let c1 = '#0f0c29', c2 = '#302b63', c3 = '#24243e';
  if (currentLevel === 'marcolii') { c1 = '#0d1b2a'; c2 = '#1b263b'; c3 = '#415a77'; }
  if (currentLevel === 'ks') { c1 = '#2d0000'; c2 = '#450000'; c3 = '#1a0000'; }
  if (currentLevel === 'brad') { c1 = '#1a1a00'; c2 = '#333300'; c3 = '#1a1a00'; }
  if (currentLevel === 'mo') { c1 = '#0a001a'; c2 = '#1a0033'; c3 = '#0d001a'; }
  grad.addColorStop(0, c1);
  grad.addColorStop(0.5, c2);
  grad.addColorStop(1, c3);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 540);

  // Draw platforms
  for (const p of platforms) {
    if (p.y >= 480) {
      // Ground
      ctx.fillStyle = '#2a5a3a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#3a7a4a';
      ctx.fillRect(p.x, p.y, p.w, 5);
    } else {
      ctx.fillStyle = '#4a4a6a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#6a6a8a';
      ctx.fillRect(p.x, p.y, p.w, 4);
    }
  }

  // Draw enemies
  for (const e of enemies) e.draw();

  // Draw player
  ctx.save();
  if (player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }
  // Flip if facing left
  if (player.facing === -1) {
    ctx.translate(player.x + player.w, player.y);
    ctx.scale(-1, 1);
    ctx.drawImage(imgMaya, 0, 0, player.w, player.h);
  } else {
    ctx.drawImage(imgMaya, player.x, player.y, player.w, player.h);
  }
  ctx.restore();

  // Shield effect
  if (player.shieldActive) {
    ctx.strokeStyle = `rgba(100, 200, 255, ${0.5 + Math.sin(levelTime * 0.2) * 0.3})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(player.x + player.w/2, player.y + player.h/2, player.w, player.h, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = `rgba(100, 200, 255, 0.1)`;
    ctx.fill();
  }

  // Draw projectiles
  for (const p of projectiles) {
    if (p.type === 'baby') {
      ctx.font = '16px serif';
      ctx.fillText(p.text, p.x - 8, p.y + 5);
    } else {
      ctx.fillStyle = '#ff0';
      ctx.shadowColor = '#ff0';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  // Draw enemy projectiles
  for (const p of enemyProjectiles) {
    if (p.text === 'NGL') {
      ctx.fillStyle = '#f55';
      ctx.font = 'bold 14px "Press Start 2P"';
      ctx.fillText('NGL', p.x - 15, p.y + 5);
    } else {
      ctx.font = '18px serif';
      ctx.fillText(p.text, p.x - 9, p.y + 6);
    }
  }

  // Draw particles
  for (const p of particles) {
    if (p.text) {
      ctx.font = p.size + 'px serif';
      ctx.globalAlpha = p.life / 40;
      ctx.fillText(p.text, p.x, p.y);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = p.color || '#ff0';
      ctx.globalAlpha = p.life / 40;
      ctx.fillRect(p.x, p.y, p.size, p.size);
      ctx.globalAlpha = 1;
    }
  }

  // HUD
  ctx.fillStyle = '#222';
  ctx.globalAlpha = 0.7;
  ctx.fillRect(10, 10, 280, 35);
  ctx.globalAlpha = 1;

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(15, 15, 150, 12);
  const hpRatio = player.hp / player.maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#4f4' : hpRatio > 0.25 ? '#ff0' : '#f44';
  ctx.fillRect(15, 15, 150 * hpRatio, 12);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(15, 15, 150, 12);

  ctx.fillStyle = '#fff';
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText('HP', 170, 25);

  // Lives display
  ctx.fillStyle = '#ff6b35';
  ctx.font = '9px "Press Start 2P"';
  ctx.fillText('♥'.repeat(lives), 200, 25);

  // Abilities
  let abY = 32;
  ctx.font = '7px "Press Start 2P"';
  if (unlockedAbilities.babyBomb) { ctx.fillStyle = '#4cf'; ctx.fillText('👶 SPC', 15, abY); }
  if (unlockedAbilities.humpShield) { ctx.fillStyle = '#4cf'; ctx.fillText('🛡️ SHF', 70, abY); }
  if (unlockedAbilities.braderall) { ctx.fillStyle = '#4cf'; ctx.fillText('⚡x2', 130, abY); }

  // Level name
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Press Start 2P"';
  ctx.textAlign = 'right';
  ctx.fillText(currentLevel.toUpperCase() + ' LEVEL', 945, 25);
  ctx.textAlign = 'left';
}

function drawDialogue() {
  // Draw the game state behind
  drawGame();

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 960, 540);

  // Dialogue box
  ctx.fillStyle = '#111';
  ctx.strokeStyle = '#e8d44d';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.roundRect(60, 350, 840, 140, 10);
  ctx.fill();
  ctx.stroke();

  // Text reveal
  dialogueTimer++;
  if (dialogueTimer % 2 === 0 && dialogueCharIndex < dialogueText.length) {
    dialogueCharIndex++;
  }
  const shown = dialogueText.substring(0, dialogueCharIndex);

  ctx.fillStyle = '#fff';
  ctx.font = '11px "Press Start 2P"';
  // Word wrap
  const words = shown.split(' ');
  let line = '';
  let ly = 385;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > 800) {
      ctx.fillText(line, 80, ly);
      line = word + ' ';
      ly += 25;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, 80, ly);

  if (dialogueCharIndex >= dialogueText.length) {
    menuBlink++;
    if (Math.floor(menuBlink / 25) % 2 === 0) {
      ctx.fillStyle = '#e8d44d';
      ctx.font = '9px "Press Start 2P"';
      ctx.textAlign = 'right';
      ctx.fillText(isMobile ? 'TAP ▶' : 'PRESS ENTER ▶', 880, 475);
      ctx.textAlign = 'left';
    }
  }
}

function drawVictory() {
  const grad = ctx.createLinearGradient(0, 0, 0, 540);
  grad.addColorStop(0, '#0a001a');
  grad.addColorStop(1, '#1a0033');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 960, 540);

  // Confetti
  menuBlink++;
  for (let i = 0; i < 30; i++) {
    const cx = (i * 33 + menuBlink * (1 + i % 3)) % 960;
    const cy = (i * 47 + menuBlink * (0.5 + i % 2)) % 540;
    ctx.fillStyle = ['#ff6b35','#4ecdc4','#ffd93d','#6c5ce7','#ff6b6b'][i % 5];
    ctx.fillRect(cx, cy, 6, 6);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e8d44d';
  ctx.font = '24px "Press Start 2P"';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 20;
  ctx.fillText('CONGRATULATIONS!', 480, 150);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '11px "Press Start 2P"';
  ctx.fillText("Maya shut down the supermarket!", 480, 220);

  // Draw all faces
  ctx.drawImage(imgMaya, 380, 260, 80, 100);
  ctx.drawImage(imgMarcolii, 120, 300, 60, 70);
  ctx.drawImage(imgKs, 260, 310, 60, 70);
  ctx.drawImage(imgBrad, 580, 310, 60, 70);
  ctx.drawImage(imgMo, 720, 300, 60, 70);

  // X marks
  ctx.fillStyle = '#f44';
  ctx.font = '36px "Press Start 2P"';
  ctx.fillText('X', 150, 400);
  ctx.fillText('X', 290, 400);
  ctx.fillText('X', 610, 400);
  ctx.fillText('X', 750, 400);

  ctx.fillStyle = '#4ecdc4';
  ctx.font = '10px "Press Start 2P"';
  ctx.fillText(isMobile ? 'TAP TO PLAY AGAIN' : 'PRESS ENTER TO PLAY AGAIN', 480, 480);
  ctx.textAlign = 'left';
}

// ============ INPUT HANDLERS ============
window.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (gameState === 'menu') {
      gameState = 'intro';
      menuBlink = 0;
    } else if (gameState === 'intro') {
      gameState = 'levelSelect';
      introShown = true;
    } else if (gameState === 'dialogue') {
      if (dialogueCharIndex >= dialogueText.length) {
        if (dialogueCallback) dialogueCallback();
      } else {
        dialogueCharIndex = dialogueText.length;
      }
    } else if (gameState === 'victory') {
      // Reset
      levelsCompleted = { marcolii: false, ks: false, brad: false, mo: false };
      unlockedAbilities = { babyBomb: false, humpShield: false, braderall: false };
      lives = 3;
      gameState = 'menu';
    }
  }

  if (gameState === 'levelSelect') {
    const levelOrder = ['marcolii', 'ks', 'brad', 'mo'];
    const num = parseInt(e.key);
    if (num >= 1 && num <= 4) {
      const idx = num - 1;
      const key = levelOrder[idx];
      const prevOk = idx === 0 || levelsCompleted[levelOrder[idx - 1]];
      if (prevOk && !levelsCompleted[key]) {
        startLevel(key);
      }
    }
  }
});

// ============ MOBILE TOUCH CONTROLS ============
// Convert screen coordinates to canvas coordinates
function screenToCanvas(sx, sy) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (sx - rect.left) / rect.width * 960,
    y: (sy - rect.top) / rect.height * 540
  };
}

// Touch button definitions (only used during 'playing' state)
const touchButtons = {
  // Left side - D-pad for movement
  left:   { x: 20,  y: 390, w: 60, h: 60, label: '◀' },
  right:  { x: 140, y: 390, w: 60, h: 60, label: '▶' },
  up:     { x: 80,  y: 325, w: 60, h: 60, label: '▲' },
  // Right side - shoot directions
  shootL: { x: 720, y: 390, w: 55, h: 55, label: '◁' },
  shootR: { x: 830, y: 390, w: 55, h: 55, label: '▷' },
  shootU: { x: 775, y: 335, w: 55, h: 55, label: '△' },
  shootD: { x: 775, y: 445, w: 55, h: 55, label: '▽' },
  // Ability buttons across bottom-center
  space:  { x: 300, y: 460, w: 80, h: 40, label: '👶' },
  shift:  { x: 530, y: 460, w: 80, h: 40, label: '🛡️' },
};

// Track active touches per button
const activeTouches = {};

function hitTestButtons(cx, cy) {
  const hits = [];
  for (const [key, btn] of Object.entries(touchButtons)) {
    if (key === 'space' && !unlockedAbilities.babyBomb) continue;
    if (key === 'shift' && !unlockedAbilities.humpShield) continue;
    if (cx >= btn.x && cx <= btn.x + btn.w && cy >= btn.y && cy <= btn.y + btn.h) {
      hits.push(key);
    }
  }
  return hits;
}

function updateTouchState() {
  for (const key of Object.keys(touch)) touch[key] = false;
  for (const keys of Object.values(activeTouches)) {
    for (const k of keys) touch[k] = true;
  }
}

if (isMobile) {
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const pos = screenToCanvas(t.clientX, t.clientY);

      if (gameState === 'playing') {
        const hits = hitTestButtons(pos.x, pos.y);
        if (hits.length > 0) {
          activeTouches[t.identifier] = hits;
          updateTouchState();
        }
      } else if (gameState === 'menu' || gameState === 'intro' || gameState === 'victory') {
        // Tap anywhere to advance
        keys['Enter'] = true;
        setTimeout(() => { keys['Enter'] = false; }, 100);
      } else if (gameState === 'dialogue') {
        if (dialogueCharIndex >= dialogueText.length) {
          if (dialogueCallback) dialogueCallback();
        } else {
          dialogueCharIndex = dialogueText.length;
        }
      } else if (gameState === 'levelSelect') {
        // Check which card was tapped
        const levelOrder = ['marcolii', 'ks', 'brad', 'mo'];
        for (let i = 0; i < 4; i++) {
          const cardX = 120 + i * 200;
          const cardY = 150;
          if (pos.x >= cardX && pos.x <= cardX + 160 && pos.y >= cardY && pos.y <= cardY + 280) {
            const key = levelOrder[i];
            const prevOk = i === 0 || levelsCompleted[levelOrder[i - 1]];
            if (prevOk && !levelsCompleted[key]) {
              startLevel(key);
            }
            break;
          }
        }
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const pos = screenToCanvas(t.clientX, t.clientY);
      if (gameState === 'playing') {
        const hits = hitTestButtons(pos.x, pos.y);
        activeTouches[t.identifier] = hits;
        updateTouchState();
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      delete activeTouches[t.identifier];
    }
    updateTouchState();
  }, { passive: false });

  canvas.addEventListener('touchcancel', e => {
    for (const t of e.changedTouches) {
      delete activeTouches[t.identifier];
    }
    updateTouchState();
  });
}

// Draw mobile touch HUD
function drawTouchControls() {
  if (!isMobile || gameState !== 'playing') return;

  ctx.save();
  for (const [key, btn] of Object.entries(touchButtons)) {
    if (key === 'space' && !unlockedAbilities.babyBomb) continue;
    if (key === 'shift' && !unlockedAbilities.humpShield) continue;

    const pressed = touch[key];
    // Button background
    ctx.fillStyle = pressed ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.12)';
    ctx.strokeStyle = pressed ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 10);
    ctx.fill();
    ctx.stroke();

    // Label
    ctx.fillStyle = pressed ? '#fff' : 'rgba(255,255,255,0.7)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (key === 'space' || key === 'shift') {
      ctx.font = '18px serif';
    } else {
      ctx.font = '20px sans-serif';
    }
    ctx.fillText(btn.label, btn.x + btn.w/2, btn.y + btn.h/2);
  }

  // Labels for groups
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('MOVE', 100, 318);
  ctx.fillText('SHOOT', 802, 328);

  ctx.restore();
}

// ============ GAME LOOP ============
function gameLoop() {
  ctx.clearRect(0, 0, 960, 540);

  switch(gameState) {
    case 'menu': drawMenu(); break;
    case 'intro': drawIntro(); break;
    case 'levelSelect': drawLevelSelect(); break;
    case 'playing': updateGame(); drawGame(); drawTouchControls(); break;
    case 'dialogue': updateGame(); drawDialogue(); break;
    case 'victory': drawVictory(); break;
  }

  requestAnimationFrame(gameLoop);
}

// Wait for images then start
Promise.all([imgBrad, imgKs, imgMarcolii, imgMaya, imgMo].map(img =>
  new Promise(resolve => {
    if (img.complete) resolve();
    else img.onload = resolve;
  })
)).then(() => gameLoop());

</script>
